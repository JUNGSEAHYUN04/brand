# brandkit nginx reverse proxy 설정
#
# 학생 본인 Oracle E2.1.Micro 서버에 배치:
#   sudo cp ~/brand/nginx-brandkit.conf /etc/nginx/sites-available/brandkit
#   sudo ln -s /etc/nginx/sites-available/brandkit /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# 80번 HTTP만 받음 — Cloudflare Worker가 시트 매핑 기반으로 학생 origin에 HTTP 프록시.
# HTTPS는 Cloudflare Universal SSL이 자동 처리 (학생 도메인 = *.aiweb2026.site).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __STUDENT_ID__-demo.aiweb2026.site;

    client_max_body_size 20M;

    # brandkit 컨테이너 (docker-compose의 7860 포트)로 프록시
    location / {
        proxy_pass http://127.0.0.1:7860;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket 헤더 (Next.js SSE 스트리밍 필수)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 스트리밍 응답을 위해 버퍼링 끄기
        proxy_buffering off;
        proxy_redirect  off;

        # Gemini API 응답 대기 대비
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # SSE 스트리밍 필수
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}