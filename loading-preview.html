<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Preview</title>
  <style>
    @font-face {
      font-family: 'Oswald-SemiBold';
      src: url('./public/font/Oswald-SemiBold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'SCDream4';
      src: url('./public/font/SCDream4.otf') format('opentype');
    }
    @font-face {
      font-family: 'SCDream5';
      src: url('./public/font/SCDream5.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
    }
    body {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 48px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: -40px;
    }

    h1 {
      font-family: 'Oswald-SemiBold', sans-serif;
      font-size: 64px;
      font-weight: 600;
      color: #282B32;
      line-height: 1;
    }

    #tip {
      font-family: 'SCDream4', sans-serif;
      font-size: 16px;
      color: rgba(40,43,50,0.5);
      line-height: 1.65;
      white-space: nowrap;
      transition: opacity 0.5s, transform 0.5s;
    }

    #tip .label {
      font-family: 'SCDream5', sans-serif;
      color: #282B32;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LOADING</h1>
    <p id="tip"></p>
  </div>

  <script>
    const TIPS = [
      '키워드가 구체적일수록 아이덴티티가 더 정교해져요.',
      '컬러 시스템은 WCAG 2.1 접근성 기준을 충족해요.',
      'Heading과 Body 폰트는 대비되면서 어울리도록 선택돼요.',
      '가이드북은 Figma SVG 파일로 바로 내보낼 수 있어요.',
      '키워드에서 톤앤매너, 컬러, 폰트가 자동으로 결정돼요.',
    ]

    const tipEl = document.getElementById('tip')
    let idx = 0

    function setTip(i) {
      tipEl.style.opacity = '0'
      tipEl.style.transform = 'translateY(8px)'
      setTimeout(() => {
        tipEl.innerHTML = `<span class="label">TIP :</span> ${TIPS[i]}`
        tipEl.style.opacity = '1'
        tipEl.style.transform = 'translateY(0)'
      }, 450)
    }

    setTip(0)
    setInterval(() => {
      idx = (idx + 1) % TIPS.length
      setTip(idx)
    }, 6000)
  </script>
</body>
</html>
